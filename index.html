<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival 19PokerClub -2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #ffffff;
    }
    .header {
      background-color: #ffffff;
      padding: 20px;
      text-align: center;
    }
    .logo {
      max-width: 100%;
      height: auto;
    }
    .container {
      max-width: 90%;
      margin: 0 auto;
      padding: 20px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1, h2 {
      margin: 15px 0;
      text-align: center;
    }
    p {
      text-align: center;
      font-size: 18px;
      margin: 15px 0;
    }
    .button {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 20px auto;
      padding: 10px;
      background-color: #FFD700;
      color: black;
      text-align: center;
      border-radius: 5px;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }
    .button:hover {
      background-color: #e6c200;
    }
    @media (min-width: 600px) {
      .button {
        max-width: 400px;
      }
    }
    @media (min-width: 768px) {
      .button {
        max-width: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://image.jimcdn.com/app/cms/image/transf/dimension=570x10000:format=png/path/s02cd059ba246facc/image/ie1bab13e63dfccbe/version/1595508526/image.png" 
         alt="Logo du Club" class="logo">
  </div>
  <div class="container">
    <h1>Bienvenue au Festival du 19PokerClub</h1>
    <h2>Du 12 au 14 juin 2026<br><br></h2>
    <p>
      ESPACE JEAN PAUL ESCANDE,<br>
      Avenue des 3 Provinces,<br>
      19100, Brive la Gaillarde
    </p><br>
    <p>
      Contact via notre page Facebook: 19PokerClub<br>
      Ou par mail: 19pokerclub@gmail.com<br>
    </p>
    <a href="inscription.html" class="button">Inscrivez-vous maintenant</a>
  </div>
</body>
</html>
